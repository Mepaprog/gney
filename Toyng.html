<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Yeng😙</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    background-color: #fff0f5;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  .card {
    background: #ffffff;
    padding: 25px 20px;
    border-radius: 20px;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    text-align: center;
    position: relative;
    z-index: 1;
  }

  p {
    color: #333;
    line-height: 1.6;
    margin: 20px 0;
    min-height: 60px;
  }

  button {
    padding: 10px 20px;
    border: none;
    border-radius: 12px;
    background: #ff4d88;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.3s;
  }

  button:hover {
    background: #ff1a66;
  }

  .heart {
    position: absolute;
    color: #ff4d88;
    font-size: 24px;
    animation: rise 4s linear forwards;
    pointer-events: none;
  }

  @keyframes rise {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
  }

  .final-text {
    position: absolute;
    top: 60%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ff1a66;
    font-size: 28px;
    text-align: center;
    font-weight: bold;
    z-index: 2;
    line-height: 1.3;
  }
</style>
</head>
<body>

<div class="card">
  <p id="text"></p>
  <button id="nextBtn">Next ➡️</button>
</div>

<script>
const sentences = [
  "Hi Yeng 😙",
  "I just want to say something from my heart…",
  "Sorry kung nabuhat nako toh. I didn’t mean to hurt you.",
  "I promise from now on, dili na nako i-bring up ang break up.",
  "If ever mag-away ta, I want us to fix things together and talk it out calmly.",
  "I know kinahanglan jud ug taas nga pagsabot, and I’m willing to work on that for us.",
  "I love you, Yeng. I will always choose you.",
  "I want you to be my forever.",
  "So… manguyab ko nimo balik 😙",
  "Will you be my girlfriend again, this time with a stronger and better us. until the end?"
];

let index = 0;
const textEl = document.getElementById("text");
const nextBtn = document.getElementById("nextBtn");
const card = document.querySelector(".card");

textEl.innerText = sentences[index];

nextBtn.addEventListener("click", () => {
  index++;
  if(index < sentences.length){
    textEl.innerText = sentences[index];
  } else {
    nextBtn.style.display = "none";
    textEl.innerHTML = "What do you say? 💖";

    const yesBtn = document.createElement("button");
    yesBtn.innerText = "Yes 💕";
    const noBtn = document.createElement("button");
    noBtn.innerText = "No 😅";

    yesBtn.onclick = () => {
      // Remove card
      card.remove();

      // Add final text
      const finalText = document.createElement("div");
      finalText.className = "final-text";
      finalText.innerText = "I LOVE YOU FOREVER AND EVER YENG🥺♥️";
      document.body.appendChild(finalText);

      // Start continuous heart stream
      function createHeart() {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerText = "💖";
        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.fontSize = (20 + Math.random()*25) + "px";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 4000); // remove after animation
      }

      // Create hearts continuously every 200ms
      setInterval(createHeart, 200);
    }

    noBtn.onclick = () => {
      noBtn.innerText = "🙂🔪";
    }

    const btnDiv = document.createElement("div");
    btnDiv.style.marginTop = "20px";
    btnDiv.style.display = "flex";
    btnDiv.style.justifyContent = "space-around";
    btnDiv.style.flexWrap = "wrap";
    btnDiv.style.gap = "10px";

    btnDiv.appendChild(yesBtn);
    btnDiv.appendChild(noBtn);
    card.appendChild(btnDiv);
  }
});
</script>

</body>
</html>
